# =============================================================================
# Tycoon Backend - Quarterly Drill Configuration
# =============================================================================

# Drill Configuration
DRILL_ENABLED=true
DRILL_SCHEDULE="0 2 1 */3 *"  # 2:00 AM on first day of every quarter
DRILL_TIMEOUT_SECONDS=14400  # 4 hours
DRILL_REQUIRED_SPACE_MB=2048

# Drill Phases
DRILL_PHASES="full_restore,pitr_restore,app_integration,performance_validation,security_validation"
DRILL_PARALLEL_PHASES=false

# Performance Thresholds
FULL_RESTORE_WARNING_THRESHOLD=1800
FULL_RESTORE_CRITICAL_THRESHOLD=3600
PITR_RESTORE_WARNING_THRESHOLD=2400
PITR_RESTORE_CRITICAL_THRESHOLD=4800
APP_INTEGRATION_THRESHOLD=900
PERFORMANCE_VALIDATION_THRESHOLD=300
SECURITY_VALIDATION_THRESHOLD=300

# Notification Configuration
DRILL_NOTIFICATION_ENABLED=true
DRILL_SLACK_CHANNEL="#disaster-recovery"
DRILL_EMAIL_RECIPIENTS="ops@company.com,devops@company.com,management@company.com"
DRILL_STAKEHOLDER_NOTIFICATION=true

# Reporting
DRILL_REPORT_FORMAT="json"
DRILL_REPORT_RETENTION_DAYS=365
DRILL_SUMMARY_ENABLED=true
DRILL_METRICS_ENABLED=true

# Validation Configuration
VALIDATE_BACKUP_ENCRYPTION=true
VALIDATE_ACCESS_CONTROLS=true
VALIDATE_AUDIT_LOGGING=true
VALIDATE_GDPR_COMPLIANCE=true

# Application Integration
APP_TEST_ENABLED=true
APP_TEST_QUERIES="SELECT COUNT(*) FROM users;SELECT COUNT(*) FROM games;SELECT COUNT(*) FROM transactions;"
APP_BUSINESS_LOGIC_TEST=true
APP_CONNECTION_TIMEOUT=30

# Security Validation
SECURITY_TEST_ENABLED=true
CLOUDTRAIL_NAME="tycoon-backups"
BUCKET_POLICY_VALIDATION=true
ENCRYPTION_VALIDATION=true
ACCESS_LOG_VALIDATION=true

# Cleanup Configuration
DRILL_CLEANUP_ENABLED=true
DRILL_DB_RETENTION_HOURS=24
DRILL_LOG_RETENTION_DAYS=90
DRILL_TEMP_RETENTION_HOURS=6

# Compliance
QUARTERLY_COMPLIANCE_REQUIRED=true
GDPR_COMPLIANCE_CHECK=true
AUDIT_TRAIL_REQUIRED=true
DOCUMENTATION_UPDATE_REQUIRED=true
