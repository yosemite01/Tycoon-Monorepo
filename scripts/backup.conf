# =============================================================================
# Tycoon Backend - Backup Configuration
# =============================================================================

# Database Configuration
DB_HOST="localhost"
DB_PORT="5432"
DB_NAME="tycoon_db"
DB_USER="postgres"
DB_PASSWORD="postgres"
DB_CONNECTION_STRING="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"

# Backup Configuration
BACKUP_ROOT_DIR="/var/backups/tycoon"
LOCAL_RETENTION_DAYS=7
COMPRESSION_LEVEL=9
PARALLEL_JOBS=4

# AWS S3 Configuration
S3_BUCKET="tycoon-backups"
AWS_REGION="us-east-1"
AWS_PROFILE="default"

# Encryption Configuration
ENCRYPTION_ALGORITHM="AES256"
GPG_RECIPIENT="tycoon-backups@company.com"

# WAL-G Configuration
WALG_S3_S3_PREFIX="s3://${S3_BUCKET}/wal-g"
WALG_COMPRESSION_METHOD="lz4"
WALG_DELTA_MAX_STEPS="5"
PGDATA="/var/lib/postgresql/data"

# Notification Configuration
SLACK_WEBHOOK_URL=""
NOTIFICATION_EMAIL="ops@company.com"
ENABLE_NOTIFICATIONS=true

# Retention Policy
FULL_BACKUP_RETENTION_DAYS=30
DIFFERENTIAL_BACKUP_RETENTION_DAYS=7
WAL_RETENTION_DAYS=30
WEEKLY_BACKUP_RETENTION_WEEKS=12
MONTHLY_BACKUP_RETENTION_MONTHS=12
YEARLY_BACKUP_RETENTION_YEARS=7

# Performance Configuration
BACKUP_TIMEOUT_SECONDS=3600
VERIFY_BACKUP=true
PARALLEL_DUMP_THREADS=4
MEMORY_LIMIT="2GB"

# Security Configuration
VAULT_ADDR=""
VAULT_ROLE=""
VAULT_SECRET_PATH="secret/tycoon/backups"

# Monitoring Configuration
METRICS_ENABLED=true
METRICS_PORT=9090
HEALTH_CHECK_ENDPOINT="/health"

# Logging Configuration
LOG_LEVEL="INFO"
LOG_FORMAT="json"
SYSLOG_ENABLED=true

# GDPR Configuration
ANONYMIZATION_ENABLED=true
DATA_SUBJECT_REQUEST_RETENTION_DAYS=30
GDPR_COMPLIANCE_MODE=true

# Testing Configuration
QUARTERLY_DRILL_ENABLED=true
DRILL_SCHEDULE="0 2 1 */3 *"
RESTORE_TEST_DATABASE="tycoon_restore_test"
DRILL_NOTIFICATION_CHANNEL="#backup-alerts"
