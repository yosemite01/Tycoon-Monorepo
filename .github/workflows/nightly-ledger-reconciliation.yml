name: Nightly Ledger Reconciliation (Staging Dry-Run)

on:
  schedule:
    # 02:15 UTC every night (offset from the in-app cron to avoid overlap)
    - cron: '15 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (true/false)'
        required: false
        default: 'true'

jobs:
  reconcile:
    name: Ledger Reconciliation Dry-Run
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Trigger reconciliation via API
        id: reconcile
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'true' }}"
          RESPONSE=$(curl -sf -X POST \
            "${{ secrets.STAGING_API_URL }}/api/admin/ledger-reconciliation/run" \
            -H "Authorization: Bearer ${{ secrets.STAGING_ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"dryRun\": ${DRY_RUN}}")
          echo "response=$RESPONSE" >> "$GITHUB_OUTPUT"
          echo "$RESPONSE" | jq .

      - name: Save report artifact
        run: |
          echo '${{ steps.reconcile.outputs.response }}' > reconciliation-report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: reconciliation-report-${{ github.run_id }}
          path: reconciliation-report.json
          retention-days: 30

      - name: Fail if alert threshold breached
        run: |
          BREACHED=$(echo '${{ steps.reconcile.outputs.response }}' | jq '.alertThresholdBreached')
          if [ "$BREACHED" = "true" ]; then
            echo "::error::Ledger discrepancy alert threshold breached! Review the report artifact."
            exit 1
          fi
